name: Sync upstream and deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: nodeget-board-workers
  cancel-in-progress: true

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Sync upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git remote add upstream https://github.com/NodeSeekDev/NodeGet-board.git || true
          git fetch upstream main
          git checkout main
          git merge --no-edit upstream/main || {
            echo "Upstream merge conflict. Please resolve manually."
            exit 1
          }

          git push origin main || true

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.13.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        env:
          VITE_BACKEND_WS: ${{ secrets.VITE_BACKEND_WS }}
          VITE_BACKEND_TOKEN: ${{ secrets.VITE_BACKEND_TOKEN }}
          VITE_RPC_DEBUG_PANEL_ENABLED: ${{ vars.VITE_RPC_DEBUG_PANEL_ENABLED || 'false' }}

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: "4"
          command: deploy
